name: Validate Package PR

# Stage 1 of 2 (untrusted): runs in the fork/PR context with a READ-ONLY token
# and NO secrets. It downloads the .deb declared by each *.deb.release.json
# manifest, verifies it, and writes the outcome to an artifact. A separate
# privileged workflow (validate-pr-comment.yml, workflow_run) posts the comment.
# This avoids the pull_request_target + checkout-PR-head footgun.

on:
  pull_request:
    branches: [main]
    paths:
      - 'pool/**/*.deb.release.json'
      - 'pool/**/*.deb'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code (untrusted, data only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev jq

      - name: Validate manifests and packages
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -uo pipefail
          ERRORS=""
          mkdir -p /tmp/out
          echo "${{ github.event.pull_request.number }}" > /tmp/out/pr-number.txt

          # Third-party submissions always arrive as fork PRs. Same-repo PRs are
          # maintainer/infra changes (e.g. the migration that seeds many authors'
          # packages at once) and must not be judged by the per-submission
          # ownership rules below.
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "Same-repo (maintainer) PR — skipping third-party submission validation."
            { echo "## ✅ Validation skipped"; echo; echo "Same-repo (maintainer/infra) PR — third-party submission checks are not applied."; } > /tmp/out/result.md
            echo "status=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reject raw .deb committed to git (must use the release-manifest flow).
          if git diff --name-only --diff-filter=A "$BASE_SHA".."$HEAD_SHA" | grep -q '\.deb$'; then
            ERRORS="${ERRORS}- ❌ Raw \`.deb\` files must not be committed to git. Upload the binary to a Release in your fork and submit a \`*.deb.release.json\` manifest (use \`czdev publish\`).\n"
          fi

          ADDED_MANIFESTS=$(git diff --name-only --diff-filter=A "$BASE_SHA".."$HEAD_SHA" | grep '\.deb\.release\.json$' || true)

          AUTHOR_EMAIL=$(gh api "users/$PR_AUTHOR" --jq '.email // empty' 2>/dev/null || true)
          NOREPLY="${PR_AUTHOR}@users.noreply.github.com"

          for manifest in $ADDED_MANIFESTS; do
            echo "=== $manifest ==="
            if [[ "$manifest" != pool/main/* ]]; then
              ERRORS="${ERRORS}- ❌ \`$manifest\` is outside \`pool/main/\`\n"; continue
            fi
            url=$(jq -r '.url // empty' "$manifest")
            sha=$(jq -r '.sha256 // empty' "$manifest")
            fname=$(jq -r '.filename // empty' "$manifest")
            dir_pkg=$(echo "$manifest" | cut -d/ -f3)
            if [[ -z "$url" || -z "$sha" || -z "$fname" ]]; then
              ERRORS="${ERRORS}- ❌ \`$manifest\` must contain \`url\`, \`sha256\`, \`filename\`\n"; continue
            fi

            deb="/tmp/$fname"
            if ! curl -fL --retry 3 --max-time 600 -o "$deb" "$url"; then
              ERRORS="${ERRORS}- ❌ Could not download \`$fname\` from \`$url\`\n"; continue
            fi
            got=$(sha256sum "$deb" | awk '{print $1}')
            if [[ "$got" != "$sha" ]]; then
              ERRORS="${ERRORS}- ❌ \`$fname\` sha256 mismatch (manifest \`$sha\`, downloaded \`$got\`)\n"; continue
            fi

            ctrl_pkg=$(dpkg-deb -f "$deb" Package 2>/dev/null || echo "")
            new_ver=$(dpkg-deb -f "$deb" Version 2>/dev/null || echo "")
            if [[ -z "$ctrl_pkg" ]]; then
              ERRORS="${ERRORS}- ❌ \`$fname\` is not a valid .deb\n"; continue
            fi
            if [[ "$dir_pkg" != "$ctrl_pkg" ]]; then
              ERRORS="${ERRORS}- ❌ Directory '$dir_pkg' != Package field '$ctrl_pkg'\n"
            fi
            # Write to a file first: `dpkg-deb -c | grep -q` makes grep close the
            # pipe on first match, so dpkg-deb dies with SIGPIPE and pipefail
            # turns the whole check into a false "missing .desktop".
            dpkg-deb -c "$deb" > /tmp/deb-contents.txt 2>/dev/null || true
            if ! grep -q '\.desktop$' /tmp/deb-contents.txt; then
              ERRORS="${ERRORS}- ❌ \`$fname\` has no .desktop file. All apps must include one.\n"
            fi
            if ! echo "$ctrl_pkg" | grep -qP '^[a-z0-9][a-z0-9.+\-]+$'; then
              ERRORS="${ERRORS}- ❌ Invalid package name: '$ctrl_pkg'\n"
            fi
            expected_name="${ctrl_pkg}_${new_ver}_$(dpkg-deb -f "$deb" Architecture).deb"
            # GitHub release assets sanitize '~' to '.'; allow either form.
            if [[ "$fname" != "$expected_name" && "$fname" != "${expected_name//\~/.}" ]]; then
              ERRORS="${ERRORS}- ❌ filename '$fname' should be '$expected_name'\n"
            fi

            maintainer=$(dpkg-deb -f "$deb" Maintainer 2>/dev/null || echo "")
            maint_email=$(echo "$maintainer" | grep -oP '<\K[^>]+' || echo "$maintainer")
            if [[ "$maint_email" != "$NOREPLY" && "$maint_email" != "$AUTHOR_EMAIL" ]]; then
              ERRORS="${ERRORS}- ❌ Maintainer '${maint_email}' does not match PR author '${PR_AUTHOR}' (expected ${NOREPLY} or your verified email)\n"
            fi

            # Version must be newer than existing manifests for this package on base.
            existing_ver=""
            for ex in $(git ls-tree -r "$BASE_SHA" --name-only | grep "^pool/main/${dir_pkg}/.*\.deb\.release\.json$" || true); do
              v=$(git show "$BASE_SHA:$ex" | jq -r '.version // empty' 2>/dev/null || true)
              if [[ -n "$v" ]]; then
                if [[ -z "$existing_ver" ]] || dpkg --compare-versions "$v" gt "$existing_ver" 2>/dev/null; then
                  existing_ver="$v"
                fi
              fi
            done
            if [[ -n "$existing_ver" ]] && dpkg --compare-versions "$new_ver" le "$existing_ver" 2>/dev/null; then
              ERRORS="${ERRORS}- ❌ Version $new_ver is not newer than existing $existing_ver\n"
            fi

            if [[ -z "$ERRORS" ]]; then echo "✓ $fname passed"; fi
          done

          # Ownership check for deleted manifests.
          DELETED=$(git diff --name-only --diff-filter=D "$BASE_SHA".."$HEAD_SHA" | grep '\.deb\.release\.json$' || true)
          for manifest in $DELETED; do
            dir_pkg=$(echo "$manifest" | cut -d/ -f3)
            url=$(git show "$BASE_SHA:$manifest" | jq -r '.url // empty' 2>/dev/null || true)
            [[ -z "$url" ]] && continue
            deb="/tmp/del-$(basename "$manifest").deb"
            if curl -fsL --max-time 600 -o "$deb" "$url" 2>/dev/null; then
              maintainer=$(dpkg-deb -f "$deb" Maintainer 2>/dev/null || echo "")
              maint_email=$(echo "$maintainer" | grep -oP '<\K[^>]+' || echo "$maintainer")
              if [[ "$maint_email" != "$NOREPLY" && "$maint_email" != "$AUTHOR_EMAIL" ]]; then
                ERRORS="${ERRORS}- ❌ Cannot delete \`$manifest\`: maintainer '${maint_email}' != PR author '${PR_AUTHOR}'\n"
              fi
            fi
          done

          if [[ -n "$ERRORS" ]]; then
            { echo "## ❌ Package Validation Failed"; echo; echo -e "$ERRORS"; echo; echo "---"; echo "*If you believe this is an error, contact a maintainer.*"; } > /tmp/out/result.md
            echo "status=failure" >> "$GITHUB_OUTPUT"
          else
            { echo "## ✅ Package Validation Passed"; echo; echo "All checks passed. Ready for maintainer review."; } > /tmp/out/result.md
            echo "status=success" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/out/result.md

      - name: Upload validation result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation
          path: /tmp/out

      - name: Fail job if validation failed
        if: steps.validate.outputs.status == 'failure'
        run: exit 1
