# Copy to CardputerZero/packages: .github/workflows/process-web-unpublish.yml
#
# Handles `repository_dispatch` (type: web-unpublish) from the developer
# portal. Re-verifies ownership (the published manifest's deb Maintainer must
# be one of the requester's verified emails, unless admin), removes the
# manifest and opens a removal PR (auto-merged when AUTO_MERGE is true).
# Removing the manifest drops the package from the APT index on the next
# update-index build.

name: Process Web Unpublish

on:
  repository_dispatch:
    types: [web-unpublish]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  AUTO_MERGE: "true"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev jq

      - name: Verify ownership and remove manifest
        id: remove
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG: ${{ github.event.client_payload.package }}
          VER: ${{ github.event.client_payload.version }}
          ARCH: ${{ github.event.client_payload.architecture }}
          SUBMITTER: ${{ github.event.client_payload.login }}
          EMAILS_JSON: ${{ toJSON(github.event.client_payload.emails) }}
          IS_ADMIN: ${{ github.event.client_payload.is_admin }}
        run: |
          set -uo pipefail
          ERR=""
          echo "$PKG" | grep -qP '^[a-z0-9][a-z0-9.+\-]+$' || { echo "::error::bad package name"; exit 1; }
          ASSET_NAME=$(echo "${PKG}_${VER}_${ARCH}.deb" | tr '~' '.')
          MANIFEST="pool/main/$PKG/$ASSET_NAME.release.json"
          if [ ! -f "$MANIFEST" ]; then
            ERR="- ❌ manifest not found: \`$MANIFEST\`\n"
          else
            URL=$(jq -r '.url // empty' "$MANIFEST")
            OWNER_EMAIL=""
            if [ -n "$URL" ] && curl -fsL --max-time 300 -o /tmp/pkg.deb "$URL" 2>/dev/null; then
              OWNER_EMAIL=$(dpkg-deb -f /tmp/pkg.deb Maintainer 2>/dev/null | grep -oP '<\K[^>]+' | tr '[:upper:]' '[:lower:]' || true)
            fi
            if [ "$IS_ADMIN" != "true" ]; then
              if [ -z "$OWNER_EMAIL" ]; then
                ERR="- ❌ could not verify ownership (binary unreachable); ask an admin\n"
              else
                OWNED=$(echo "$EMAILS_JSON" | jq --arg e "$OWNER_EMAIL" 'map(ascii_downcase) | contains([$e])')
                [ "$OWNED" = "true" ] || ERR="- ❌ package is owned by \`$OWNER_EMAIL\`, not @$SUBMITTER\n"
              fi
            fi
          fi
          if [ -z "$ERR" ]; then
            BRANCH="unpublish/${PKG}-${VER}-web-${{ github.run_id }}"
            git config user.name "cardputerzero-bot"
            git config user.email "cardputerzero-bot@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git rm -q "$MANIFEST"
            git commit -m "unpublish: $PKG $VER via developer portal by @$SUBMITTER"
            git push origin "$BRANCH"
            PR_URL=$(gh pr create --base main --head "$BRANCH" \
              --title "unpublish: $PKG $VER (portal request by @$SUBMITTER)" \
              --body "Removal requested by @$SUBMITTER via the developer portal. Ownership verified against the published binary's Maintainer email.")
            if [ "$AUTO_MERGE" = "true" ]; then
              gh pr merge "$PR_URL" --squash --delete-branch || echo "::warning::auto-merge failed; awaiting manual review"
            fi
          fi
          printf 'errors<<EOM\n%b\nEOM\n' "$ERR" >> "$GITHUB_OUTPUT"

      - name: Report failure
        if: always() && steps.remove.outputs.errors != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBMITTER: ${{ github.event.client_payload.login }}
          PKG: ${{ github.event.client_payload.package }}
          VER: ${{ github.event.client_payload.version }}
          ERRS: ${{ steps.remove.outputs.errors }}
        run: |
          {
            echo "@$SUBMITTER your unpublish request for \`$PKG $VER\` failed:"
            echo
            printf '%b' "$ERRS"
            echo
            echo "Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/issue.md
          gh issue create --title "portal unpublish failed: $PKG $VER" --body-file /tmp/issue.md
