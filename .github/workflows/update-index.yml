name: Deploy APT Repository to Pages

on:
  push:
    branches: [main]
    paths:
      - 'pool/**'
      - 'oss/**'
      - '.github/workflows/update-index.yml'

  workflow_dispatch:
    inputs:
      sync_oss:
        description: 'Also sync the generated APT repository to Aliyun OSS'
        required: false
        type: boolean
        default: false
      oss_prefix:
        description: 'OSS object prefix for manual sync runs'
        required: false
        default: 'packages'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build APT repository
        run: |
          mkdir -p public/dists/stable/main/binary-arm64
          cp -a pool public/
          cd public
          dpkg-scanpackages --multiversion pool/ > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages
          cd dists/stable
          printf '%s\n' \
            "Origin: CardputerZero" \
            "Label: CardputerZero AppStore" \
            "Suite: stable" \
            "Codename: stable" \
            "Architectures: arm64" \
            "Components: main" \
            "Description: CardputerZero APT Repository" > Release
          echo "MD5Sum:" >> Release
          for f in main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
            size=$(wc -c < "$f" | tr -d ' ')
            hash=$(md5sum "$f" | awk '{print $1}')
            printf " %s %s %s\n" "$hash" "$size" "$f" >> Release
          done
          echo "SHA256:" >> Release
          for f in main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
            size=$(wc -c < "$f" | tr -d ' ')
            hash=$(sha256sum "$f" | awk '{print $1}')
            printf " %s %s %s\n" "$hash" "$size" "$f" >> Release
          done

      - name: Setup ossutil
        if: ${{ vars.PACKAGES_OSS_SYNC_ENABLED == 'true' || inputs.sync_oss == true }}
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ vars.PACKAGES_OSS_ENDPOINT || 'oss-cn-shenzhen.aliyuncs.com' }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Sync APT repository to Aliyun OSS
        if: ${{ vars.PACKAGES_OSS_SYNC_ENABLED == 'true' || inputs.sync_oss == true }}
        env:
          OSS_SYNC_ENABLED: 'true'
          OSS_PUBLIC_DIR: public
          OSS_ENDPOINT: ${{ vars.PACKAGES_OSS_ENDPOINT || 'oss-cn-shenzhen.aliyuncs.com' }}
          OSS_BUCKET: ${{ vars.PACKAGES_OSS_BUCKET || 'cardputer-zero-repo' }}
          OSS_PREFIX: ${{ inputs.oss_prefix || vars.PACKAGES_OSS_PREFIX || 'packages' }}
          OSS_PUBLIC_BASE_URL: ${{ vars.PACKAGES_OSS_PUBLIC_BASE_URL }}
        run: oss/sync-apt-repo.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-registry:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger registry update on cardputerzero.github.io
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: CardputerZero/cardputerzero.github.io
          event-type: packages-updated
